<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeblr - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <div class="brand-panel">
        <div class="brand-logo">
            <span class="logo-icon">9</span> DEEBLR
        </div>
    </div>

    <div class="form-panel">
        <div class="login-box">
            <h2>Create Account</h2>
            <p class="subtitle">Join the community</p>

            <form id="registerForm">
                <input type="text" id="username" placeholder="Username" required>

                <input type="email" id="email" placeholder="Email Address" required>

                <input type="password" id="password" placeholder="Password" required>

                <button type="submit" class="btn-primary" style="width:100%">Sign Up ></button>
            </form>

            <p class="footer-text">
                Already have an account? <a href="login.html">Login</a>
            </p>

            <div id="message" style="margin-top:15px; text-align:center; min-height: 20px;"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Stop page reload

        // 1. Get data from the inputs
        const data = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const messageBox = document.getElementById('message');
        messageBox.innerHTML = '<span style="color:gray">Processing...</span>';

        try {
            // 2. Send to Java Backend
            const response = await fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // 3. READ RESPONSE (Safe Mode)
            // We read as text first to avoid crashing if Java sends plain text
            const textResponse = await response.text();
            let result;

            try {
                result = JSON.parse(textResponse); // Try to parse JSON
            } catch (err) {
                // If it fails, use the plain text as the message
                result = { message: textResponse };
            }

            // 4. Handle Success or Failure
            if (response.ok) {
                alert("Registration Successful! Please Login.");
                window.location.href = 'login.html';
            } else {
                // Show error message (Red)
                const errorMsg = result.message || "Registration failed.";
                messageBox.innerHTML = `<span style="color:red">${errorMsg}</span>`;
            }

        } catch (error) {
            console.error('Error:', error);
            messageBox.innerHTML = `<span style="color:red">Server error. Is Spring Boot running?</span>`;
        }
    });
</script>

</body>
</html>
