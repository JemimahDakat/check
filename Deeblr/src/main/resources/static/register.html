<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Deeblr</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <div class="brand-panel">
        <div class="brand-logo">
            <span class="logo-icon">9</span> DEEBLR
        </div>
    </div>

    <div class="form-panel">
        <div class="login-box">
            <h2>Create Account</h2>
            <p class="subtitle">Join the unified deepfake detection platform</p>

            <form id="registerForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>

                <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
            </form>

            <p id="errorMessage" style="color: red; margin-top: 15px; display: none; font-size: 14px; text-align: center;"></p>

            <div class="footer-text" style="text-align: center;">
                Already have an account? <a href="login.html" style="color: #2a5298; font-weight: bold;">Log in</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById("registerForm").addEventListener("submit", async function(event) {
        event.preventDefault(); // Stop page reload

        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMessage");

        //Prepare Data as URL-Encoded Form
        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('email', email);
        formData.append('password', password);

        try {
            // send to Backend
            const response = await fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            });

            // Handle Result
            if (response.ok) {
                alert("Registration Successful! Please check your email to verify your account .");
                window.location.href = "login.html";
            } else {
                const text = await response.text();
                errorMsg.style.display = "block";
                errorMsg.innerText = "Error: " + text;
            }
        } catch (error) {
            console.error("Network Error:", error);
            errorMsg.style.display = "block";
            errorMsg.innerText = "Connection failed. Is the server running?";
        }
    });
</script>

</body>
</html>
