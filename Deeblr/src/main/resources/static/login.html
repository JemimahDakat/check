<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deeblr - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <div class="brand-panel">
        <div class="brand-logo">
            <img src="../../java/com/example/frontend/logo.png" alt="Deeblr Logo" style="height: 60px; width: auto;">
        </div>
    </div>

    <div class="form-panel">
        <div class="login-box">
            <h2>Login</h2>
            <p class="subtitle">Please login to  your account</p>

            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>

                <div class="actions">
                    <a href="#">Forgot password?</a>
                    <button type="submit" class="btn-primary">Login ></button>
                </div>
            </form>

            <p class="footer-text">Don't have an account? <a href="register.html">Sign up</a></p>
            <div id="error-msg" style="color: red; margin-top: 10px; text-align: center;"></div>
        </div>
    </div>
</div>

<script>
    // interrupt the form submission do the page does not reload contantly
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // api call - sned credentials to the authcontroller
        // use fetvh - standard to httpss requests in js
        fetch('http://localhost:8080/api/auth/login?username=' + username + '&password=' + password, {
            method: 'POST'
        })
            .then(async response => {
                if (response.ok) {
                    // backend returned JSON with the token
                    const data = await response.json();

                    console.log("Login Success! Token:", data.token); // debugging help

                    //state manegement
                    // save the token in localstorage
                    // token stays in local storage until its deleted by logging out
                    // save the Token and Username
                    localStorage.setItem("jwt_token", data.token);
                    localStorage.setItem("username", data.username);

                    // redirect user to feed
                    window.location.href = "feed.html";
                } else {
                    //show the error sent by backend and display message
                    const text = await response.text();
                    document.getElementById('error-msg').innerText = text;
                }
            })
            .catch(error => {
                // a network error - added this to help pinpont what error
                console.error('Error:', error);
                document.getElementById('error-msg').innerText = "Network Error.";
            });
    });
</script>
</body>
</html>
