<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deeblr - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <div class="brand-panel">
        <div class="brand-logo">
            <img src="../../java/com/example/frontend/logo.png" alt="Deeblr Logo" style="height: 60px; width: auto;">
        </div>
    </div>

    <div class="form-panel">
        <div class="login-box">
            <h2>Login</h2>
            <p class="subtitle">Please select your account</p>

            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>

                <div class="actions">
                    <a href="#">Forgot password?</a>
                    <button type="submit" class="btn-primary">Login ></button>
                </div>
            </form>

            <p class="footer-text">Don't have an account? <a href="register.html">Sign up</a></p>
            <div id="error-msg" style="color: red; margin-top: 10px; text-align: center;"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Use URLSearchParams
        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);

        try {
            // send to  '/login' endpoint
            const response = await fetch('http://localhost:8080/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            });

            // check status  (200 = OK, 401 = Bad Password)
            if (response.ok) {
                // Save username locally so we can show it on the feed
                localStorage.setItem('user', username);
                // Redirect to Feed
                window.location.href = 'feed.html';
            } else {
                document.getElementById('error-msg').innerText = "Invalid username or password";
            }
        } catch (error) {
            console.error("Connection error:", error);
            document.getElementById('error-msg').innerText = "Server not responding. Is Java running?";
        }
    });
</script>
</body>
</html>
