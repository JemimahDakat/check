<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deeblr - New Post</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .breadcrumb { font-size: 12px; color: #888; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .update-bar { display: flex; align-items: center; margin-bottom: 20px; }
        .back-icon {
            width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; margin-right: 15px; cursor: pointer;
            background: white; color: #555;
        }
    </style>
</head>
<body class="feed-body">

<div class="header">
    <a href="index.html" class="brand">
        <div class="brand-logo">
            <img src="../../java/com/example/frontend/logo.png" alt="Deeblr Logo" style="height: 60px; width: auto;">
        </div>
    </a>

    <div class="nav-links">
        <a href="index.html"><img src="homepage.png" style="width:20px;height:20px;">Homepage</a>
        <a href="feed.html"><img src="feed.png" style="width:20px;height:20px;">Feed</a>
        <a href="upload.html" class="active"><img src="upload.png" style="width:20px;height:20px;">Upload</a>
    </div>

    <div id="auth-section"></div>
</div>

<div class="feed-container">

    <div class="breadcrumb">
        <span>Homepage</span> <span style="font-size:10px;">></span> <span>Upload</span>
    </div>

    <div class="update-bar">
        <div class="back-icon" onclick="window.history.back()">‹</div>
        <h3 style="margin:0; font-size:18px; color:#333;">Create Post</h3>
    </div>

    <div class="card">
        <form id="postForm">
            <p style="font-size:14px; color:#666; margin-bottom:15px;">
                Posting as: <strong id="displayUsername" style="color:#2a5298;">Loading...</strong>
            </p>

            <textarea id="postContent" placeholder="Write a caption..."
                      style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ddd; min-height: 80px;" required></textarea>

            <div style="margin-bottom:20px; border: 2px dashed #ddd; padding: 20px; text-align: center; border-radius: 8px;">
                <input type="file" id="postFile" accept="image/*,video/*" required style="display: block; margin: 0 auto;">
            </div>

            <!-- Hidden input to store the deepfake verdict before submission -->
            <input type="hidden" id="deepfakeVerdict" value="false">

            <div id="analysisStatus" style="margin-bottom:10px; text-align:center; font-size:14px;"></div>

            <button type="submit" id="submitBtn" class="btn-primary" style="width:100%">Post Update</button>
            <div id="uploadStatus" style="margin-top:10px; text-align:center;"></div>
        </form>
    </div>
</div>

<script>
    window.onload = function() {
        const token = localStorage.getItem("jwt_token");
        const username = localStorage.getItem("username");

        if (!token || !username) {
            window.location.href = "login.html";
            return;
        }

        document.getElementById('displayUsername').innerText = username;

        const initial = username.charAt(0).toUpperCase();
        document.getElementById('auth-section').innerHTML = `
            <div class="user-badge" onclick="logout()">
                <div class="user-avatar-small" style="background:#2a5298; color:white;">${initial}</div>
                <span style="margin-left:8px; font-weight:500;">${username}</span>
                <span style="font-size:10px; margin-left:5px; color:#888;">(Logout)</span>
            </div>
        `;
    };

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    // Run analysis automatically when the user selects a file
    document.getElementById('postFile').addEventListener('change', async function() {
        const file = this.files[0];
        const statusText = document.getElementById('analysisStatus');

        if (!file) return;

        // Images do not need deepfake scanning, only videos do
        if (!file.type.startsWith('video/')) {
            statusText.innerText = "Images bypass AI scanning. Ready to post!";
            statusText.style.color = "green";
            document.getElementById('deepfakeVerdict').value = "false";
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        statusText.innerText = "Scanning video... Please wait.";
        statusText.style.color = "blue";

        document.getElementById('submitBtn').disabled = true;

        try {
            const token = localStorage.getItem("jwt_token");

            const response = await fetch("http://localhost:8080/api/posts/analyse", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`
                },
                body: formData
            });

            const result = await response.json();

            // Store the boolean result in the hidden input so the submit handler can read it
            document.getElementById('deepfakeVerdict').value = result.is_fake;

            if (result.is_fake) {
                statusText.innerText = `Deepfake Detected (${result.confidence}% confidence)`;
                statusText.style.color = "red";
            } else {
                statusText.innerText = "Verdict: Authentic Video";
                statusText.style.color = "green";
            }

        } catch (error) {
            console.error("Analysis failed:", error);
            statusText.innerText = "AI service offline. You may still upload.";
            statusText.style.color = "orange";
            document.getElementById('deepfakeVerdict').value = "false";
        } finally {
            document.getElementById('submitBtn').disabled = false;
        }
    });

    document.getElementById('postForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const token = localStorage.getItem("jwt_token");
        const content = document.getElementById('postContent').value;
        const fileInput = document.getElementById('postFile');
        const status = document.getElementById('uploadStatus');

        if (fileInput.files.length === 0) return alert("Please select a file!");

        // Read the verdict that was stored by the analysis step
        const isDeepfake = document.getElementById('deepfakeVerdict').value;

        const formData = new FormData();
        formData.append("content", content);
        formData.append("file", fileInput.files[0]);
        formData.append("isDeepfake", isDeepfake);

        status.innerHTML = '<span style="color:blue">Uploading... Please wait.</span>';

        try {
            const response = await fetch('http://localhost:8080/api/posts', {
                method: 'POST',
                headers: {
                    // Do not set Content-Type manually here. The browser sets it to
                    // multipart/form-data automatically when using FormData.
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            });

            if (response.ok) {
                status.innerHTML = '<span style="color:green">Success! Redirecting...</span>';
                setTimeout(() => {
                    window.location.href = 'feed.html';
                }, 1000);
            } else {
                const errorText = await response.text();
                status.innerHTML = `<span style="color:red">Error: ${errorText}</span>`;
            }
        } catch (error) {
            console.error("Upload Error:", error);
            status.innerHTML = `<span style="color:red">Server connection failed.</span>`;
        }
    });
</script>

</body>
</html>
