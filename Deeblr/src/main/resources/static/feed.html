<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeblr Feed</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .breadcrumb { font-size: 12px; color: #888; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .update-bar { display: flex; align-items: center; margin-bottom: 20px; }
        .back-icon {
            width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; margin-right: 15px; cursor: pointer;
            background: white; color: #555;
        }
    </style>
</head>
<body class="feed-body">

<div class="header">
    <a href="index.html" class="brand">
        <div class="brand-logo">
            <img src="../../java/com/example/frontend/logo.png" alt="Deeblr Logo" style="height: 60px; width: auto;">
        </div>
    </a>

    <div class="nav-links">
        <a href="index.html"><img src="homepage.png" style="width:20px;height:20px;">Homepage</a>
        <a href="feed.html" class="active"><img src="feed.png" style="width:20px;height:20px;">Feed</a>
        <a href="upload.html"><img src="upload.png" style="width:20px;height:20px;">Upload</a>
    </div>

    <div id="auth-section"></div>
</div>

<div class="feed-container">

    <div class="breadcrumb">
        <span>Homepage</span> <span style="font-size:10px;">></span> <span>Feed</span>
    </div>

    <div class="update-bar">
        <div class="back-icon" onclick="window.history.back()">‹</div>
        <h3 style="margin:0; font-size:18px; color:#333;">Feed Updates</h3>
        <span class="badge">Live</span>

    </div>

    <div id="feed-list">
        <p style="text-align:center; color:#888; margin-top:50px;">Loading posts</p>
    </div>



</div>

<script>
    // on load - this is what happens when the feed page first opens up
    window.onload = function() {
        const token = localStorage.getItem("jwt_token");
        const username = localStorage.getItem("username");

        // if  they dont have a token, kick them back to login
        if (!token || !username) {
            window.location.href = "login.html";
            return;
        }

        // USER INTERFACE- inject the users name into the header
        const initial = username.charAt(0).toUpperCase();
        const authSection = document.getElementById('auth-section');

        authSection.innerHTML = `
            <div class="user-badge" onclick="logout()">
                <div class="user-avatar-small" style="background:#2a5298; color:white;">${initial}</div>
                <span style="margin-left:8px; font-weight:500;">${username}</span>
                <span style="font-size:10px; margin-left:5px; color:#666;">(Logout)</span>
            </div>
        `;


        //LOAD POSTS
        loadPosts();
    };

    // LOGOUT - delete the token and go back to login
    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
    //  function to toggle the  text
    function toggleVerdict(button) {
        const verdictTag = button.nextElementSibling;
        if (verdictTag.style.display === "none") {
            verdictTag.style.display = "block";
            button.innerText = " Hide  Verdict";
        } else {
            verdictTag.style.display = "none";
            button.innerText = "Reveal Verdict";
        }
    }


    //GET POSTS
    async function loadPosts() {
        const token = localStorage.getItem("jwt_token");
        const container = document.getElementById('feed-list');
        //GET /api/posts
        try {
            const response = await fetch('http://localhost:8080/api/posts', {
                method: 'GET',
                headers: {
                    //AUTHENTICATION
                    //  attach the token back together so the Backend knows who the user is
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });


            // handle expired sessions
            if (response.status === 403 || response.status === 401) {
                alert("Session expired.");
                logout();
                return;
            }
            //parse JSON data
            const posts = await response.json();
            container.innerHTML = "";

            // what happens when there are no posts
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center; padding:40px;">
                        <p style="color:#888;">No posts yet.</p>
                        <a href="upload.html" class="btn-primary" style="text-decoration:none; display:inline-block; margin-top:10px;">Create Post</a>
                    </div>`;
                return;
            }

            // use a loop creat html for each post
            posts.forEach(post => {
                const firstLetter = post.username ? post.username.charAt(0).toUpperCase() : '?';

                //Ensure content is never null
                const postContent = post.content ? post.content : "";

                // This determines if we show a Video Player or an Image Tag
                let mediaHtml = ''
                let aiVerdictHtml ='';

                if (post.mediaUrl) {
                    // check media type from backend from the backend
                    if (post.mediaType === 'VIDEO') {
                        mediaHtml = `
                            <div class="image-container">
                                <video controls style="width:100%; border-radius:8px; background:black;">
                                    <source src="${post.mediaUrl}" type="video/mp4">
                                    Your browser does not support the video tag.
                                </video>
                            </div>`;

                        // make the warning based on the database flag
                        const isFake = post.isDeepfake === true || post.isDeepfake === "true"; // Handle string/bool mapping
                        const verdictText = isFake ? "SYNTHETIC MEDIA DETECTED " : "Authentic Video";
                        const verdictColor = isFake ? "red" : "green";

                        aiVerdictHtml = `
                            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; text-align: center;">
                                <button class="btn-toggle" onclick="toggleVerdict(this)">RevealVerdict</button>
                                <p class="verdict-tag" style="display: none; font-weight: bold; margin-top: 10px; color: ${verdictColor};">
                                    ${verdictText}
                                </p>
                            </div>
                        `;
                    } else {
                        // Default to Image
                        mediaHtml = `<div class="image-container"><img src="${post.mediaUrl}"></div>`;
                    }
                }

                // format the timestap properly
                const dateObj = post.createdAt ? new Date(post.createdAt) : new Date();
                const dateStr = dateObj.toLocaleDateString("en-US", { month: 'short', day: 'numeric', year: 'numeric' }) +
                    " - " +
                    dateObj.toLocaleTimeString("en-UK", { hour: '2-digit', minute:'2-digit' });

                // html string
                const html = `
                    <div class="card">
                        <div class="card-header">
                            <div class="avatar-circle">${firstLetter}</div>
                            <div class="meta">
                                <strong>${post.username || 'Unknown'}</strong>
                                <span class="tag friend">User</span>
                            </div>
                            <div class="date">${dateStr}</div>
                        </div>

                        <div style="font-size:15px; color:#444; margin-bottom:15px; line-height:1.5;">
                            ${postContent}
                        </div>

                        ${mediaHtml}
                        ${aiVerdictHtml}

                        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                        <div id="commentList_${post.id}" style="margin-bottom: 10px; max-height: 150px; overflow-y: auto;">
                            </div>

                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="commentInput_${post.id}" placeholder="Add a comment" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                            <button onclick="submitComment(${post.id})" class="btn-primary" style="padding: 8px 15px;">Post</button>
                        </div>
                    </div>
                <! --here -->
                `;
                // append new card to the list
                container.innerHTML += html;
            });
            posts.forEach(post => loadComments(post.id));

        } catch (error) {
            console.error("Error:", error);
            container.innerHTML = "<p style='text-align:center; color:red;'>Server error.</p>";
        }
    }
    function loadComments(postId) {
        const token = localStorage.getItem("jwt_token"); // get the token

        fetch(`http://localhost:8080/api/comments/post/${postId}`, {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        })
            .then(response => {
                if (!response.ok) {
                    // dsaftey net do not try to read json if there is an error
                    throw new Error(`Server returned status: ${response.status}`);
                }
                return response.json()
            })
            .then(comments => {
                const section = document.getElementById(`commentList_${postId}`);
                section.innerHTML = '';

                comments.forEach(c => {
                    section.innerHTML += `
                    <div style="background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
                        <strong style="color: #2a5298;">${c.author || 'User'}</strong>
                        <p style="margin: 5px 0 0 0; font-size: 14px;">${c.text}</p>
                    </div>
                `;
                });
            })
            .catch(err => console.error("Could not load comments", err));
    }

    // sumbit a comment
    function submitComment(postId) {
        const textInput = document.getElementById(`commentInput_${postId}`);
        const token = localStorage.getItem("jwt_token");

        if(!token) return alert("You must be logged in to comment!");
        if(!textInput.value) return alert("Please write a comment first!");

        // olnly send text and backend figures out the author
        const newComment = {
            postId : postId,
            text: textInput.value
        };

        fetch('http://localhost:8080/api/comments', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token // pass the token
            },
            body: JSON.stringify(newComment)
        }).then(response => {
            if (response.ok) {
                textInput.value = ''; // clear text box
                loadComments(postId);       // refresh the list
            } else {
                alert("Failed to post comment. Your session expired.");
            }
        });

    }
</script>

</body>
</html>
